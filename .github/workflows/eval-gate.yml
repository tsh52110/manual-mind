# Ragas evaluation gate.
#
# Runs a fixed 10-question subset against the committed baseline index and fails
# if faithfulness drops below 0.85. Judge calls hit the Anthropic API and cost
# real money, so the gate is manual-dispatch (plus PRs that touch retrieval
# code, where a regression is actually plausible).
name: eval-gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "evals/**"

jobs:
  ragas-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1.5

      - name: Run Ragas gate (10-question subset, faithfulness >= 0.85)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m evals.run_ragas --config baseline --subset 10 --min-faithfulness 0.85

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-results
          path: evals/results/baseline_subset10_*
